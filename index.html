<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>労働役設置法</title>
<style>
  :root{
    --paper:#f6f3ea;
    --paper-edge:#e9e3d2;
    --ink:#2a2620;
    --ink-soft:#6b6355;
    --seal:#8a2e2e;
    --rule:#c9c0a8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #efe9d8 0%, var(--paper) 55%),
      var(--paper);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    min-height:100vh;
    padding:0 0 6rem;
  }

  header{
    max-width:900px;
    margin:0 auto;
    padding:3.5rem 1.5rem 2rem;
    text-align:center;
    position:relative;
  }
  .eyebrow{
    font-size:0.72rem;
    letter-spacing:0.35em;
    color:var(--ink-soft);
    writing-mode:horizontal-tb;
    margin-bottom:0.9rem;
  }
  h1{
    font-size:clamp(1.8rem,5vw,2.6rem);
    letter-spacing:0.18em;
    margin:0 0 0.6rem;
    font-weight:600;
  }
  .sub{
    font-size:0.82rem;
    color:var(--ink-soft);
    letter-spacing:0.08em;
  }
  .rule{
    width:64px;
    height:2px;
    background:var(--seal);
    margin:1.4rem auto 0;
  }

  main{
    max-width:920px;
    margin:0 auto;
    padding:0 1.2rem;
    display:flex;
    flex-direction:column;
    gap:2.6rem;
  }

  .page{
    background:#fff;
    border:1px solid var(--paper-edge);
    box-shadow:
      0 1px 2px rgba(0,0,0,0.04),
      0 18px 40px -20px rgba(40,32,20,0.35);
    padding:0.9rem;
    position:relative;
  }
  .page::before{
    content:"";
    position:absolute;
    inset:0.35rem;
    border:1px solid var(--rule);
    pointer-events:none;
  }
  .page-num{
    position:absolute;
    top:-0.75rem;
    left:50%;
    transform:translateX(-50%);
    background:var(--paper);
    padding:0.15rem 0.9rem;
    font-size:0.75rem;
    letter-spacing:0.25em;
    color:var(--ink-soft);
    border:1px solid var(--paper-edge);
  }
  .page img{
    display:block;
    width:100%;
    height:auto;
    cursor:zoom-in;
  }

  footer{
    max-width:900px;
    margin:3rem auto 0;
    padding:0 1.5rem;
    text-align:center;
    font-size:0.72rem;
    color:var(--ink-soft);
    letter-spacing:0.08em;
  }
  footer .rule{margin:0 auto 1rem;}

  /* Lightbox */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(20,17,12,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:2rem;
    cursor:zoom-out;
  }
  .lightbox.open{display:flex;}
  .lightbox img{
    max-width:100%;
    max-height:100%;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
    background:#fff;
  }
  .lightbox-hint{
    position:fixed;
    bottom:1.2rem;
    left:50%;
    transform:translateX(-50%);
    color:#e9e3d2;
    font-size:0.72rem;
    letter-spacing:0.15em;
    opacity:0.75;
  }

  @media (max-width:600px){
    header{padding:2.4rem 1rem 1.4rem;}
    h1{letter-spacing:0.12em;}
    main{gap:1.8rem;padding:0 0.7rem;}
    .page{padding:0.5rem;}
    .page::before{inset:0.22rem;}
  }

  @media (min-width:900px){
    .page img{cursor:zoom-in;}
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">全 十六 条 ・ 五 編</div>
  <h1>労働役設置法</h1>
  <div class="sub">条文全文（画像資料 全2頁）</div>
  <div class="rule"></div>
</header>

<main>
  <div class="page">
    <span class="page-num">頁　一</span>
    <img src="page1.png" alt="労働役設置法 第1頁" loading="lazy" onclick="openLightbox(this.src)">
  </div>
  <div class="page">
    <span class="page-num">頁　二</span>
    <img src="page2.png" alt="労働役設置法 第2頁" loading="lazy" onclick="openLightbox(this.src)">
  </div>
</main>

<footer>
  <div class="rule"></div>
  画像をタップ／クリックすると拡大表示されます
</footer>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="拡大表示">
</div>
<div class="lightbox-hint" id="lightbox-hint" style="display:none;">タップして閉じる</div>

<script>
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbHint = document.getElementById('lightbox-hint');

  function openLightbox(src){
    lbImg.src = src;
    lb.classList.add('open');
    lbHint.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox(){
    lb.classList.remove('open');
    lbHint.style.display = 'none';
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeLightbox();
  });
</script>

</body>
</html>
